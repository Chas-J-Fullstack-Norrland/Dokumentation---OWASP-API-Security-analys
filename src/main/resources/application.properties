spring.application.name=library
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.cache.type=simple
spring.cache.cache-names=books,bookById,bookAvailability

logging.level.org.springframework.cache=TRACE


resilience4j.circuitbreaker.instances.openLibraryApi.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.openLibraryApi.sliding-window-size=5
resilience4j.circuitbreaker.instances.openLibraryApi.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.openLibraryApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.openLibraryApi.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.openLibraryApi.ignore-exceptions[0]=com.example.library.exception.ExternalBookNotFoundException
resilience4j.circuitbreaker.instances.openLibraryApi.register-health-indicator=true

resilience4j.retry.instances.openLibraryApi.max-attempts=3
resilience4j.retry.instances.openLibraryApi.wait-duration=500ms
resilience4j.retry.instances.openLibraryApi.ignore-exceptions[0]=com.example.library.exception.ExternalBookNotFoundException
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true



spring.config.import=vault://
spring.cloud.vault.uri=http://127.0.0.1:8200
spring.cloud.vault.token=root
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.default-context=library

app.jwt.access-expiration-seconds=900
app.jwt.refresh-expiration-seconds=1209600